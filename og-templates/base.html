<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #111111;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    align-items: stretch;
    position: relative;
  }
  .watermark {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Archivo Black', sans-serif;
    font-size: 200px;
    color: rgba(255,255,255,0.035);
    letter-spacing: 0.02em;
    user-select: none;
    white-space: nowrap;
  }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 72px 80px;
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #F59E0B;
    margin-bottom: 24px;
  }
  .headline {
    font-family: 'Archivo Black', sans-serif;
    font-size: 62px;
    line-height: 1.05;
    color: #FAFAF7;
    max-width: 820px;
  }
  .headline .amber { color: #F59E0B; }
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 22px;
    color: #B8A88E;
    margin-top: 28px;
    font-weight: 400;
    max-width: 640px;
    line-height: 1.5;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: #F59E0B;
    z-index: 2;
  }
  .logo-area {
    position: absolute;
    bottom: 44px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }
  .logo-text {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: #FAFAF7;
    letter-spacing: 0.01em;
  }
  .logo-text span { color: #F59E0B; }
  .dot {
    width: 8px;
    height: 8px;
    background: #F59E0B;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="watermark">JACKAL</div>
  <div class="content">
    <div class="eyebrow">JACKALAI.APP</div>
    <div class="headline" id="headline"></div>
    <div class="tagline" id="tagline"></div>
  </div>
  <div class="bottom-bar"></div>
  <div class="logo-area">
    <div class="dot"></div>
    <div class="logo-text">Jackal <span>AI</span></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('headline').innerHTML = params.get('h') || 'Jackal AI';
    document.getElementById('tagline').textContent = params.get('t') || '';
  </script>
</body>
</html>
