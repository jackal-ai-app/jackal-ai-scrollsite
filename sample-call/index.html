<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hear Jackal AI — Sample Call</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #0D0D0D;
      --card-bg:     #161616;
      --border:      #2a2a2a;
      --text:        #F0F0F0;
      --muted:       #888;
      --purple:      #814AC8;
      --cyan:        #3DE0FC;
      --radius-card: 16px;
      --radius-el:   8px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 40px 32px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      font-variant: small-caps;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── Heading ── */
    h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 14px;
    }

    /* ── Subhead ── */
    .subhead {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── Audio player ── */
    audio {
      width: 100%;
      margin-bottom: 24px;
      border-radius: var(--radius-el);
      accent-color: var(--cyan);
    }

    /* ── CTA button ── */
    .cta-btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: var(--purple);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: var(--radius-el);
      transition: opacity 0.15s ease;
    }

    .cta-btn:hover {
      opacity: 0.88;
    }

    .cta-btn:active {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Live Demo Call</span>
    <h1>Hear Jackal AI answer a tradie call</h1>
    <p class="subhead">This is what your callers hear when you're on the tools. Real Australian voice. No scripts that sound robotic.</p>

    <audio controls>
      <source src="REPLACE_WITH_AUDIO_FILE_URL" />
      Your browser does not support the audio element.
    </audio>

    <a href="REPLACE_WITH_CALCOM_URL" class="cta-btn">Book a 20-Minute Call &rarr;</a>
  </div>
</body>
</html>
